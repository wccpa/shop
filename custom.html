<!DOCTYPE html>
<html lang="en" class="bg-gray-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Custom Keychain Order - Weekend Custom Creations</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        html, body { background-color: #e5e7eb; height: 100%; margin: 0; padding: 0; font-family: sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-gray-800">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-[#0b5394]">Custom Orders</h1>
            <a href="index.html" class="text-sm font-bold text-gray-600 hover:text-[#0b5394]">Back to Shop</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
            
            <div class="w-full md:w-1/2 bg-gray-100 p-8 flex items-center justify-center border-b md:border-b-0 md:border-r border-gray-200">
                <img 
                    id="product-preview" 
                    src="https://via.placeholder.com/600x600/8B4513/ffffff?text=Saddle+Brown+Keychain" 
                    alt="Custom Keychain Preview" 
                    class="w-full h-auto object-contain rounded-lg shadow-md fade-in"
                >
            </div>

            <div class="w-full md:w-1/2 p-6 md:p-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-2">Custom Leather Keychain</h2>
                <p class="text-sm text-gray-600 mb-6">Design your custom keychain. Upload a photo of your vehicle, choose your leather color, and give it a name.</p>

                <form action="https://formsubmit.co/sales@weekendcustomcreations.com" method="POST" enctype="multipart/form-data" class="space-y-5">
                    
                    <input type="hidden" name="_subject" value="New Custom Order Request!">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_next" value="https://www.weekendcustomcreations.com/thanks"> <div>
                        <label for="color-select" class="block text-sm font-bold text-gray-700 mb-1">Leather Color</label>
                        <select id="color-select" name="Leather Color" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0b5394] focus:border-transparent bg-white cursor-pointer">
                            <option value="brown">Saddle Brown</option>
                            <option value="black">Midnight Black</option>
                            <option value="tan">Natural Tan</option>
                        </select>
                    </div>

                    <div>
                        <label for="vehicle-name" class="block text-sm font-bold text-gray-700 mb-1">Vehicle Name (Max 12 Characters)</label>
                        <input type="text" id="vehicle-name" name="Vehicle Name" maxlength="12" required placeholder="e.g., THE BEAST" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0b5394] focus:border-transparent uppercase">
                        <p class="text-[10px] text-gray-500 mt-1 text-right" id="char-count">0 / 12</p>
                    </div>

                    <div>
                        <label for="vehicle-photo" class="block text-sm font-bold text-gray-700 mb-1">Upload Vehicle Photo</label>
                        <input type="file" id="vehicle-photo" name="attachment" accept="image/png, image/jpeg, image/webp" required class="w-full p-2 border border-gray-300 rounded-lg bg-gray-50 text-sm cursor-pointer file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-[#0b5394] file:text-white hover:file:bg-blue-700">
                    </div>

                    <div>
                        <label for="customer-email" class="block text-sm font-bold text-gray-700 mb-1">Your Email Address</label>
                        <input type="email" id="customer-email" name="email" required placeholder="name@example.com" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#0b5394] focus:border-transparent">
                    </div>

                    <div class="pt-2">
                        <button type="submit" class="w-full py-4 bg-[#0b5394] hover:bg-blue-700 text-white rounded-xl font-bold text-lg shadow-lg transition-transform active:scale-95">
                            Submit Custom Order
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        // 1. Dynamic Image Switching Logic
        const colorSelect = document.getElementById('color-select');
        const productPreview = document.getElementById('product-preview');

        // Replace these URLs with the actual image URLs for your products
        const imageLibrary = {
            'brown': 'https://via.placeholder.com/600x600/8B4513/ffffff?text=Saddle+Brown+Keychain',
            'black': 'https://via.placeholder.com/600x600/000000/ffffff?text=Midnight+Black+Keychain',
            'tan': 'https://via.placeholder.com/600x600/D2B48C/ffffff?text=Natural+Tan+Keychain'
        };

        colorSelect.addEventListener('change', (e) => {
            const selectedColor = e.target.value;
            // Remove animation class to trigger reflow, then add it back to fade in the new image
            productPreview.classList.remove('fade-in');
            void productPreview.offsetWidth; // Trigger DOM reflow
            
            productPreview.src = imageLibrary[selectedColor];
            productPreview.classList.add('fade-in');
        });

        // 2. Character Counter Logic
        const vehicleInput = document.getElementById('vehicle-name');
        const charCount = document.getElementById('char-count');

        vehicleInput.addEventListener('input', (e) => {
            const length = e.target.value.length;
            charCount.textContent = `${length} / 12`;
            
            if (length === 12) {
                charCount.classList.add('text-red-600', 'font-bold');
            } else {
                charCount.classList.remove('text-red-600', 'font-bold');
            }
        });
    </script>
</body>
</html>
